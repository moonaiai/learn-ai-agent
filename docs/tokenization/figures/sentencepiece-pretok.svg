<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 600; fill: #1f2937; }
      .sub { font-size: 12px; fill: #475569; }
      .box { fill: #f4f6fa; stroke: #2b3a55; stroke-width: 1.5; }
      .box-active { fill: #dde7ff; stroke: #2b3a55; stroke-width: 1.5; }
      .arrow { stroke: #2b3a55; stroke-width: 1.5; fill: none; marker-end: url(#tri); }
      .mark { fill: #fde68a; stroke: #92400e; stroke-width: 1; }
      text { font-size: 12px; fill: #1f2937; }
      .tok { fill: #dde7ff; stroke: #2b3a55; stroke-width: 1; }
      .space { fill: #fde68a; stroke: #92400e; stroke-width: 1; }
    </style>
    <marker id="tri" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b3a55" />
    </marker>
  </defs>

  <text x="20" y="28" class="title">SentencePiece：把空格当普通字符处理</text>
  <text x="20" y="48" class="sub">原文: "Hello World"；空格用 ▁ (U+2581) 显式编入 vocab</text>

  <text x="20" y="78" class="sub">标准 BPE 假设：先按空格切词，再对每个词做子词切分</text>
  <g transform="translate(20,90)">
    <rect class="box" x="0" y="0" width="120" height="60" rx="6"/>
    <text x="60" y="25" text-anchor="middle">Hello</text>
    <text x="60" y="42" text-anchor="middle" font-size="11" fill="#475569">whitespace split</text>
    <rect class="box" x="130" y="0" width="120" height="60" rx="6"/>
    <text x="190" y="25" text-anchor="middle">World</text>
    <text x="190" y="42" text-anchor="middle" font-size="11" fill="#475569">whitespace split</text>
  </g>
  <text x="270" y="120" class="sub" font-style="italic">中文/日文/泰文没有空格 → 这种预处理失败</text>

  <text x="20" y="170" class="sub">SentencePiece：把整段文本当作 raw 字节/字符流，空格作为 ▁ 进 vocab</text>
  <g transform="translate(20,182)">
    <rect class="box-active" x="0" y="0" width="540" height="50" rx="6"/>
    <text x="270" y="32" text-anchor="middle">"Hello World" → 字符流 "▁Hello▁World"</text>
  </g>

  <text x="20" y="260" class="sub">BPE 在这个流上跑，▁ 自然出现在高频组合中</text>
  <g transform="translate(20,270)">
    <rect class="space" x="0" y="0" width="30" height="30" rx="4"/>
    <text x="15" y="20" text-anchor="middle">▁H</text>
    <rect class="tok" x="32" y="0" width="40" height="30" rx="4"/>
    <text x="52" y="20" text-anchor="middle">ell</text>
    <rect class="tok" x="74" y="0" width="40" height="30" rx="4"/>
    <text x="94" y="20" text-anchor="middle">o</text>
    <rect class="space" x="116" y="0" width="30" height="30" rx="4"/>
    <text x="131" y="20" text-anchor="middle">▁W</text>
    <rect class="tok" x="148" y="0" width="40" height="30" rx="4"/>
    <text x="168" y="20" text-anchor="middle">or</text>
    <rect class="tok" x="190" y="0" width="40" height="30" rx="4"/>
    <text x="210" y="20" text-anchor="middle">ld</text>
  </g>
  <text x="320" y="290" class="sub">解码：拼回所有 token，把 ▁ 替换成空格</text>
</svg>